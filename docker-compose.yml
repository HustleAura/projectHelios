# docker-compose.yml (development)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: password
      POSTGRES_DB: helios_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios -d helios_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://helios:password@db:5432/helios_db
      FIREBASE_PROJECT_ID: your-firebase-project-id
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-sa.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app
      - ./firebase-service-account.json:/run/secrets/firebase-sa.json:ro

volumes:
  pgdata:
